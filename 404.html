<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>냉온수 배관 관경 산정 시스템</title>
<script>
  // GitHub Pages SPA 리다이렉트 — 404를 index.html로 보냄
  var seg = window.location.pathname.split('/');
  var repo = seg[1]; // GitHub Pages 레포 이름
  var rest = seg.slice(2).join('/');
  var qs   = window.location.search ? window.location.search.slice(1) : '';
  var hash = window.location.hash ? window.location.hash.slice(1) : '';
  var redirect = window.location.origin + '/' + repo +
    '/?p=/' + rest + (qs ? '&q=' + qs : '') + (hash ? '&h=' + hash : '');
  window.location.replace(redirect);
</script>
</head>
<body>
<p style="font-family:sans-serif;text-align:center;padding:40px;color:#0369a1;">
  ⏳ 리다이렉트 중... <br>
  <a href="./" style="color:#0369a1">앱으로 이동</a>
</p>
</body>
</html>
